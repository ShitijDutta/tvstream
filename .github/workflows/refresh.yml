name: Refresh playlist

on:
  schedule:
    - cron: "30 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate playlist
        run: python curate.py

      - name: Commit if changed
        run: |
          git config user.name "playlist-bot"
          git config user.email "actions@users.noreply.github.com"
          git add playlist.m3u status.md
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Refresh playlist ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
