# TVStream channel lineup
# ------------------------
# Each channel gets a fixed number (tvg-chno) so the lineup never shuffles.
# `match` is an ordered list of glob patterns tested against the tvg-id of
# entries in the source playlists — first pattern with a working stream wins,
# so put the preferred quality first (e.g. HD before SD).
# `voice: true` exposes the channel to the Alexa bridge as a voice device.

settings:
  epg_url: "https://epgshare01.online/epgshare01/epg_ripper_IN1.xml.gz"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36"
  connect_timeout: 5
  read_timeout: 8
  max_workers: 16
  # Throughput test: download part of a real segment and require this much
  # headroom over the stream's realtime bitrate before accepting a stream
  # when a faster alternative candidate exists.
  speed_test: true
  min_speed_ratio: 1.5
  speed_max_bytes: 3000000

sources:
  - name: iptv-org India
    url: "https://iptv-org.github.io/iptv/countries/in.m3u"
  - name: iptv-org Hindi
    url: "https://iptv-org.github.io/iptv/languages/hin.m3u"

groups_order: [Serials, Movies, Sports, News, Bhakti, Lifestyle]

